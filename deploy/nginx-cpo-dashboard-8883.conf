# CPO Dashboard — nginx on port 8883 (when you serve the app on 8883)
# Copy to: /etc/nginx/sites-available/cpo-dashboard
# Then: sudo ln -sf /etc/nginx/sites-available/cpo-dashboard /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# This proxies /api to your backend so POST /api/v4/auth/login works (fixes 405).

server {
    listen 8883;
    server_name 54.217.14.204;
    # If using a domain: server_name yourdomain.com 54.217.14.204;

    root /var/www/cpo-dashboard/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Forward all /api requests (GET, POST, etc.) to the real API — fixes 405 on login
    # Long timeouts for PDF/export (Puppeteer can take 2–5 min with many rows)
    location /api/ {
        proxy_pass https://dash.evse.cloud/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
