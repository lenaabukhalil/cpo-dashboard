# CPO Dashboard — nginx site for Vite/React SPA
# Serves dist/ and optionally proxies /api to your backend.
# Install: sudo cp deploy/nginx-cpo-dashboard.conf /etc/nginx/sites-available/cpo-dashboard
#         sudo ln -sf /etc/nginx/sites-available/cpo-dashboard /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ec2-54-217-14-204.eu-west-1.compute.amazonaws.com;
    # If you use a domain, add it: server_name yourdomain.com www.yourdomain.com ec2-54-217-14-204.eu-west-1.compute.amazonaws.com;

    root /var/www/cpo-dashboard/dist;
    index index.html;

    # SPA: all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Optional: proxy API to your Node-RED/backend (use if VITE_API_URL is empty and app calls same origin)
    location /api/ {
        proxy_pass https://dash.evse.cloud/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    # Static assets can be cached
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Optional: HTTPS (uncomment and adjust after you have SSL certs, e.g. certbot)
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
}
